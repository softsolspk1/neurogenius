// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        kotlinVersion = "1.9.23"
        ndkVersion = "26.1.10909125"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    }
}

// Define the path to react-native and node_modules for all subprojects
def resolveReactNativeDir() {
    def candidates = [
        new File(rootDir, "../node_modules/react-native"),          // Local
        new File(rootDir, "../../../node_modules/react-native")     // Monorepo root
    ]
    for (File dir : candidates) {
        if (new File(dir, "package.json").exists()) {
            return dir
        }
    }
    // Fallback: use node to find it
    return new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile()
}

def reactNativeDir = resolveReactNativeDir()
def nodeModulesDir = reactNativeDir.getParentFile()

rootProject.ext.REACT_NATIVE_NODE_MODULES_DIR = reactNativeDir
rootProject.ext.NODE_MODULES_DIR = nodeModulesDir

apply plugin: "com.facebook.react.rootproject"

allprojects {
    configurations.all {
        resolutionStrategy {
            force "com.facebook.react:react-android:0.74.5"
            force "com.facebook.react:hermes-android:0.74.5"
        }
    }
    
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(reactNativeDir, "android").getAbsolutePath())
        }
        maven {
            // Android JSC is installed from npm
            url(new File(nodeModulesDir, "jsc-android/dist"))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

subprojects {
    // Set properties early for all libraries
    project.ext.set("REACT_NATIVE_NODE_MODULES_DIR", reactNativeDir)
    
    // Standardize SDK versions for all subprojects
    project.ext.set("compileSdkVersion", 34)
    project.ext.set("targetSdkVersion", 34)
    project.ext.set("buildToolsVersion", "34.0.0")
    project.ext.set("minSdkVersion", 23)

    project.configurations.all {
        resolutionStrategy {
            force "com.facebook.react:react-android:0.74.5"
            force "com.facebook.react:hermes-android:0.74.5"
        }
    }
}
